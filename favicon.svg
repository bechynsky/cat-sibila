<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#6c3fc5"/>
  <!-- Cat ears -->
  <polygon points="12,28 18,8 28,24" fill="#f5c542"/>
  <polygon points="52,28 46,8 36,24" fill="#f5c542"/>
  <polygon points="14,26 19,12 26,23" fill="#6c3fc5"/>
  <polygon points="50,26 45,12 38,23" fill="#6c3fc5"/>
  <!-- Cat face -->
  <ellipse cx="32" cy="36" rx="18" ry="16" fill="#f5c542"/>
  <!-- Eyes -->
  <ellipse cx="25" cy="33" rx="3" ry="4" fill="#2d1b69"/>
  <ellipse cx="39" cy="33" rx="3" ry="4" fill="#2d1b69"/>
  <ellipse cx="25.5" cy="32" rx="1.2" ry="1.5" fill="#fff"/>
  <ellipse cx="39.5" cy="32" rx="1.2" ry="1.5" fill="#fff"/>
  <!-- Nose -->
  <polygon points="32,38 30,40 34,40" fill="#e88ca5"/>
  <!-- Mouth -->
  <path d="M30,40 Q32,44 34,40" fill="none" stroke="#2d1b69" stroke-width="1"/>
  <!-- Whiskers -->
  <line x1="8" y1="36" x2="22" y2="37" stroke="#2d1b69" stroke-width="0.8"/>
  <line x1="8" y1="40" x2="22" y2="39" stroke="#2d1b69" stroke-width="0.8"/>
  <line x1="56" y1="36" x2="42" y2="37" stroke="#2d1b69" stroke-width="0.8"/>
  <line x1="56" y1="40" x2="42" y2="39" stroke="#2d1b69" stroke-width="0.8"/>
  <!-- Star (fortune element) -->
  <polygon points="32,48 33.5,52 38,52 34.5,55 36,59 32,56.5 28,59 29.5,55 26,52 30.5,52" fill="#fff" opacity="0.9"/>
</svg>
