<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kočičí věštírna</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="card">
    <h1>Kočičí věštírna</h1>
    <p class="description">Klikni na tlapku a nech si vyvěštit, co ti dnes našepká moudré kotě.</p>

    <button id="fortuneButton" type="button">Vyvěštit mňau budoucnost</button>

    <section class="result" aria-live="polite">
      <h2>Tvoje věštba</h2>
      <p id="fortuneText">Čekám na tvoje kliknutí...</p>
      <img
        id="fortuneImage"
        alt="Ilustrace kočky k věštbě"
        hidden
      >
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
